
services:

  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge_pass
      POSTGRES_DB: skillforge_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge -d skillforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-server:
    build: ./ai-server
    ports:
      - "8000:8000"
    env_file:
      - ./ai-server/.env
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://skillforge:skillforge_pass@postgres:5432/skillforge_db
      JWT_SECRET: skillforge_jwt_secret_key_2024_secure
      JWT_EXPIRE: 7d
      FASTAPI_URL: http://ai-server:8000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      ai-server:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
